# set -g default-terminal 'xterm-256color'
# set-option -sa terminal-features ',xterm-256color:RGB'

# Test
# Use tmux’s own 256-color terminfo (better compatibility than xterm-256color inside tmux)
set -g default-terminal "tmux-256color"
# Enable truecolor (RGB)
set-option -sa terminal-features ",tmux-256color:RGB"

# NeoVim checkhealth advice
set-option -sg escape-time 10
set-option -g focus-events on

# Change prefix 
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

# Open panes in current directory
# TODO: fix
bind '|' split-window -h -c "#{pane_curreny_path}"
bind '-' split-window -v -c "#{pane_curreny_path}"

bind-key N new-window -n "SSH" "~/dotfiles/shell-scripts/ssh_login.sh"

unbind r
bind r source-file ~/.tmux.conf

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse on

# Enable VI navigation in panes
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

unbind -T copy-mode-vi MouseDragEnd1Pane

# Start windows and panes at index 1, isntead of 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g status-position top 

set -g @continuum-restore 'on'

# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Theme
set -g @plugin 'vaaleyard/tmux-dotbar'

set -g @tmux-dotbar-fg "#6E6F70"
set -g @tmux-dotbar-bg "default"
set -g @tmux-dotbar-fg-current "#BE95FF"
set -g @tmux-dotbar-fg-session "#FFFFFF"
set -g @tmux-dotbar-fg-prefix "#95E6CB"
set -g @tmux-dotbar-position "top"
set -g @tmux-dotbar-justify "absolute-centre"
set -g @tmux-dotbar-left "true"
set -g @tmux-dotbar-status-left "#S" # see code
set -g @tmux-dotbar-right "false"
set -g @tmux-dotbar-status-right "%H:%M" # see code
set -g @tmux-dotbar-window-status-format " #W "
set -g @tmux-dotbar-window-status-separator " • "
set -g @tmux-dotbar-maximized-icon "󰊓"
set -g @tmux-dotbar-show-maximized-icon-for-all-tabs false

# set-option -g renumber-windows on
# set -g base-index 1
# setw -g pane-base-index 1

# Plugins
# set -g @plugin 'arcticicestudio/nord-tmux'
# set -g @plugin 'srcery-colors/srcery-tmux'
# set -g @glugin 'egel/tmux-gruvbox'
# set -g @tmux-gruvbox 'dark' # or 'light'
# source-file ~/.tmux-carbonfox.conf
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Initialize tmux plugin manager -- ALWAYS EOF
run '~/.tmux/plugins/tpm/tpm'
